<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块小游戏</title>
    <style>
        /* 页面基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f8ff;
        }

        /* 游戏标题 */
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }

        /* 游戏画布容器 */
        .game-container {
            position: relative;
            border: 5px solid #34495e;
            border-radius: 8px;
            background-color: #ffffff;
        }

        canvas {
            display: block;
        }

        /* 游戏信息面板 */
        .game-info {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #2c3e50;
            display: flex;
            gap: 30px;
        }

        /* 游戏控制按钮 */
        .controls {
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin: 0 10px;
            border: none;
            border-radius: 5px;
            background-color: #3498db;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* 游戏结束提示 */
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #e74c3c;
            display: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <h1>打砖块小游戏</h1>
    <div class="game-container">
        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <!-- 游戏结束提示 -->
        <div class="game-over" id="gameOver">游戏结束!</div>
    </div>

    <!-- 游戏信息和控制 -->
    <div class="game-info">
        <div>分数: <span id="score">0</span></div>
        <div>生命值: <span id="lives">3</span></div>
    </div>

    <div class="controls">
        <button id="startBtn">开始游戏</button>
        <button id="resetBtn">重置游戏</button>
    </div>

    <script>
        // 1. 获取DOM元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const gameOverElement = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        // 2. 游戏核心变量
        let score = 0;          // 分数
        let lives = 3;          // 生命值
        let isGameRunning = false; // 游戏是否运行

        // 球拍参数
        const paddle = {
            width: 100,
            height: 20,
            x: canvas.width / 2 - 50,
            y: canvas.height - 30,
            speed: 8,
            dx: 0 // 水平移动方向
        };

        // 小球参数
        const ball = {
            size: 10,
            x: canvas.width / 2,
            y: paddle.y - 10,
            speed: 5,
            dx: 2,
            dy: -2
        };

        // 砖块参数
        const brickConfig = {
            rows: 5,
            cols: 8,
            width: 80,
            height: 20,
            padding: 10,
            offsetX: 45,
            offsetY: 60,
            bricks: [] // 存储所有砖块的数组
        };

        // 3. 初始化砖块
        function initBricks() {
            brickConfig.bricks = [];
            for (let r = 0; r < brickConfig.rows; r++) {
                brickConfig.bricks[r] = [];
                for (let c = 0; c < brickConfig.cols; c++) {
                    // 每个砖块包含位置和是否激活的状态
                    brickConfig.bricks[r][c] = {
                        x: c * (brickConfig.width + brickConfig.padding) + brickConfig.offsetX,
                        y: r * (brickConfig.height + brickConfig.padding) + brickConfig.offsetY,
                        active: true
                    };
                }
            }
        }

        // 4. 绘制函数
        // 绘制球拍
        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.fillStyle = '#3498db';
            ctx.fill();
            ctx.closePath();
        }

        // 绘制小球
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.closePath();
        }

        // 绘制砖块
        function drawBricks() {
            brickConfig.bricks.forEach(row => {
                row.forEach(brick => {
                    if (brick.active) {
                        ctx.beginPath();
                        ctx.rect(brick.x, brick.y, brickConfig.width, brickConfig.height);
                        // 不同行的砖块用不同颜色
                        ctx.fillStyle = `hsl(${r * 40}, 70%, 50%)`;
                        ctx.fill();
                        ctx.closePath();
                    }
                });
            });
        }

        // 绘制分数和生命值
        function drawStats() {
            scoreElement.textContent = score;
            livesElement.textContent = lives;
        }

        // 清空画布
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 5. 更新游戏状态
        function update() {
            // 移动球拍
            paddle.x += paddle.dx;

            // 球拍边界检测（左右）
            if (paddle.x < 0) {
                paddle.x = 0;
            }
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }

            // 移动小球
            ball.x += ball.dx;
            ball.y += ball.dy;

            // 小球边界检测（左右）
            if (ball.x + ball.size > canvas.width || ball.x - ball.size < 0) {
                ball.dx *= -1; // 反弹
            }

            // 小球边界检测（上）
            if (ball.y - ball.size < 0) {
                ball.dy *= -1; // 反弹
            }

            // 小球边界检测（下）- 生命值减少
            if (ball.y + ball.size > canvas.height) {
                lives--;
                drawStats();
                
                // 重置小球和球拍位置
                resetBallAndPaddle();

                // 检查是否游戏结束
                if (lives === 0) {
                    endGame();
                }
            }

            // 球拍和小球碰撞检测
            if (
                ball.y + ball.size > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width
            ) {
                ball.dy *= -1;
                // 优化反弹角度（根据撞击位置）
                const collidePoint = ball.x - (paddle.x + paddle.width / 2);
                const normalizedCollidePoint = collidePoint / (paddle.width / 2);
                ball.dx = normalizedCollidePoint * 4;
            }

            // 小球和砖块碰撞检测
            brickConfig.bricks.forEach(row => {
                row.forEach(brick => {
                    if (brick.active) {
                        if (
                            ball.x + ball.size > brick.x &&
                            ball.x - ball.size < brick.x + brickConfig.width &&
                            ball.y + ball.size > brick.y &&
                            ball.y - ball.size < brick.y + brickConfig.height
                        ) {
                            ball.dy *= -1; // 反弹
                            brick.active = false; // 砖块消失
                            score += 10; // 加分
                            drawStats();

                            // 检查是否通关（所有砖块被消除）
                            checkWin();
                        }
                    }
                });
            });
        }

        // 6. 游戏循环
        function gameLoop() {
            if (!isGameRunning) return;
            
            clearCanvas();
            drawPaddle();
            drawBall();
            drawBricks();
            update();

            requestAnimationFrame(gameLoop);
        }

        // 7. 辅助函数
        // 重置小球和球拍位置
        function resetBallAndPaddle() {
            paddle.x = canvas.width / 2 - 50;
            ball.x = canvas.width / 2;
            ball.y = paddle.y - 10;
            ball.dx = 2;
            ball.dy = -2;
        }

        // 开始游戏
        function startGame() {
            if (isGameRunning) return;
            
            isGameRunning = true;
            gameOverElement.style.display = 'none';
            gameLoop();
        }

        // 重置游戏
        function resetGame() {
            score = 0;
            lives = 3;
            isGameRunning = false;
            
            drawStats();
            resetBallAndPaddle();
            initBricks();
            
            clearCanvas();
            drawPaddle();
            drawBall();
            drawBricks();
            gameOverElement.style.display = 'none';
        }

        // 结束游戏
        function endGame() {
            isGameRunning = false;
            gameOverElement.style.display = 'block';
        }

        // 检查是否通关
        function checkWin() {
            // 检查是否还有激活的砖块
            const hasActiveBricks = brickConfig.bricks.some(row => 
                row.some(brick => brick.active)
            );

            if (!hasActiveBricks) {
                isGameRunning = false;
                gameOverElement.textContent = '恭喜通关!';
                gameOverElement.style.color = '#2ecc71';
                gameOverElement.style.display = 'block';
            }
        }

        // 8. 事件监听
        // 键盘控制（左右箭头）
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                paddle.dx = paddle.speed;
            } else if (e.key === 'ArrowLeft') {
                paddle.dx = -paddle.speed;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                paddle.dx = 0;
            }
        });

        // 按钮点击事件
        startBtn.addEventListener('click', startGame);
        resetBtn.addEventListener('click', resetGame);

        // 9. 初始化游戏
        initBricks();
        resetGame();
    </script>
</body>
</html>
